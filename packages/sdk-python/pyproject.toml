[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "eidolondb"
version = "0.1.0"
description = "Official Python client for EidolonDB — self-managing memory for AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = []
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Intended Audience :: Developers",
]

[project.urls]
Homepage = "https://eidolondb.com"
Documentation = "https://eidolondb.com/docs"
Repository = "https://github.com/millbj92/EidolonDB"
Issues = "https://github.com/millbj92/EidolonDB/issues"

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio", "responses"]

[tool.setuptools.packages.find]
where = ["src"]
