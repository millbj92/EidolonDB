[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "eidolondb"
version = "0.1.0"
description = "Official Python client for EidolonDB — self-managing memory for AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = []
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio", "responses"]

[tool.setuptools.packages.find]
where = ["src"]
